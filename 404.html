<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Zipline Adventure Park</title>
    <meta name="description" content="Oops! It looks like you've wandered off the trail. Return to safety at Zipline Adventure Park.">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 0;
            background-color: var(--zl-light);
            position: relative;
            overflow: hidden;
        }
        
        [data-theme="dark"] .error-page {
            background-color: #000000;
        }
        
        .error-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
            text-align: center;
        }
        
        .error-code {
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            color: var(--zl-primary);
            margin-bottom: 20px;
            font-family: var(--zl-font-heading);
            text-shadow: 10px 10px 0 rgba(45, 106, 79, 0.1);
        }
        
        .error-icon {
            font-size: 5rem;
            color: var(--zl-secondary);
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .forest-bg-icons {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.05;
            z-index: 1;
        }
        
        .forest-bg-icons i {
            position: absolute;
            font-size: 3rem;
        }
    </style>
</head>
<body>

    <div class="error-page">
        <!-- Floating icons for atmosphere -->
        <div class="forest-bg-icons">
            <i class="bi bi-tree-fill" style="top: 10%; left: 5%;"></i>
            <i class="bi bi-tree" style="top: 20%; right: 10%;"></i>
            <i class="bi bi-wind" style="bottom: 15%; left: 20%;"></i>
            <i class="bi bi-brightness-high" style="top: 40%; left: 15%;"></i>
            <i class="bi bi-tree-fill" style="bottom: 10%; right: 5%;"></i>
            <i class="bi bi-geo-alt" style="top: 60%; right: 20%;"></i>
        </div>

        <div class="container">
            <div class="error-content mx-auto fade-in-up">
                <div class="error-icon">
                    <i class="bi bi-compass"></i>
                </div>
                <div class="error-code">404</div>
                <h1 class="fw-bold mb-3">Lost in the Forest?</h1>
                <p class="text-muted lead mb-5">Oops! It looks like you've wandered off the marked trail. Don't worry, even the best adventurers take a wrong turn sometimes.</p>
                <div class="d-flex flex-wrap gap-3 justify-content-center">
                    <a href="index.html" class="btn btn-primary btn-lg px-5">Back to Safety</a>
                    <a href="contact.html" class="btn btn-outline-primary btn-lg px-5">Report an Issue</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Theme Toggle -->
    <div class="position-fixed top-0 end-0 p-4 z-3">
        <div class="d-flex gap-2">
            <button id="rtl-toggle" class="rtl-toggle-btn"><i class="bi bi-arrow-left-right"></i></button>
            <button id="theme-toggle" class="theme-toggle-btn">
                <i class="bi bi-moon-fill"></i>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
