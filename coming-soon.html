<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Zipline Adventure Park</title>
    <meta name="description" content="New adventures are on the horizon. Stay tuned for the grand opening of our newest zipline courses and aerial attractions.">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    
    <style>
        .coming-soon-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(rgba(8, 28, 21, 0.85), rgba(8, 28, 21, 0.85)), url('assets/images/home-hero.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            padding: 80px 0;
            text-align: center;
        }
        
        .cs-content {
            max-width: 700px;
        }
        
        .cs-logo {
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 40px;
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }
        
        .cs-logo i {
            color: var(--zl-secondary);
        }
        
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
        }
        
        .countdown-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            min-width: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .countdown-value {
            font-size: 2.5rem;
            font-weight: 800;
            display: block;
            line-height: 1;
            margin-bottom: 5px;
            color: var(--zl-secondary);
        }
        
        .countdown-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }
        
        .subscribe-form .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 15px 25px;
            border-radius: 50px;
        }
        
        .subscribe-form .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--zl-secondary);
            box-shadow: none;
        }
        
        .subscribe-form .btn {
            border-radius: 50px;
            padding-left: 30px;
            padding-right: 30px;
        }
    </style>
</head>
<body>

    <div class="coming-soon-page">
        <div class="container">
            <div class="cs-content mx-auto fade-in-up">
                <a href="index.html" class="cs-logo">
                    <i class="bi bi-tree-fill me-2"></i><span>ZIPLINE</span>
                </a>
                
                <h1 class="display-4 fw-bold mb-3">New Adventures Arriving Soon</h1>
                <p class="lead text-white-50 mb-5">Our guides are currently carving out new paths and rigging extreme lines. We're launching something truly vertical soon.</p>
                
                <div class="countdown-container">
                    <div class="countdown-item">
                        <span class="countdown-value">14</span>
                        <span class="countdown-label">Days</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-value">08</span>
                        <span class="countdown-label">Hours</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-value">32</span>
                        <span class="countdown-label">Mins</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-value">45</span>
                        <span class="countdown-label">Secs</span>
                    </div>
                </div>
                
                <div class="subscribe-form mb-5">
                    <h5 class="mb-3">Get Notified on Launch Day</h5>
                    <form class="row g-3 justify-content-center">
                        <div class="col-md-8">
                            <div class="input-group">
                                <input type="email" class="form-control" placeholder="Enter your email address" required>
                                <button class="btn btn-secondary" type="submit">Notify Me</button>
                            </div>
                        </div>
                    </form>
                </div>
                
                <div class="social-links d-flex justify-content-center gap-4">
                    <a href="#" class="text-white fs-4"><i class="bi bi-facebook"></i></a>
                    <a href="#" class="text-white fs-4"><i class="bi bi-instagram"></i></a>
                    <a href="#" class="text-white fs-4"><i class="bi bi-youtube"></i></a>
                    <a href="#" class="text-white fs-4"><i class="bi bi-twitter-x"></i></a>
                </div>
            </div>
        </div>
    </div>

    <!-- Theme Toggle -->
    <div class="position-fixed top-0 end-0 p-4 z-3">
        <div class="d-flex gap-2">
            <button id="rtl-toggle" class="rtl-toggle-btn">RTL</button>
            <button id="theme-toggle" class="theme-toggle-btn">
                <i class="bi bi-moon-fill"></i>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
