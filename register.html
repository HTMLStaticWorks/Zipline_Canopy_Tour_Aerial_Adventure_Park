<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Zipline Adventure Park</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">

    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('assets/images/home-hero.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            padding: 20px;
        }

        .auth-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(8, 28, 21, 0.9) 0%, rgba(45, 106, 79, 0.7) 100%);
        }

        .auth-card {
            background: #fff;
            border-radius: var(--zl-border-radius-lg);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        [data-theme="dark"] .auth-card {
            background: #000000;
            border: 1px solid var(--zl-border-color);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo .navbar-brand {
            font-size: 1.5rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .auth-logo i {
            font-size: 1.6rem;
            color: var(--zl-secondary) !important;
        }

        .auth-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        .auth-controls .rtl-toggle-btn,
        .auth-controls .theme-toggle-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: var(--zl-transition);
        }

        .auth-controls .rtl-toggle-btn:hover,
        .auth-controls .theme-toggle-btn:hover {
            background: var(--zl-primary);
            border-color: var(--zl-primary);
        }

        .social-login {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border: 1px solid var(--zl-border-color);
            border-radius: var(--zl-border-radius);
            background: transparent;
            color: var(--zl-heading-color);
            transition: var(--zl-transition);
            font-weight: 600;
        }

        .social-btn:hover {
            background: var(--zl-light);
            border-color: var(--zl-primary);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin-bottom: 25px;
            color: var(--zl-body-color);
            opacity: 0.5;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--zl-border-color);
        }

        .divider:not(:empty)::before {
            margin-right: .5em;
        }

        .divider:not(:empty)::after {
            margin-left: .5em;
        }

        /* Hover Colors */
        .auth-card a:hover {
            color: var(--zl-secondary) !important;
        }

        /* Eye Toggle Border Removal */
        .input-group .btn-outline-secondary {
            border: none !important;
            background: transparent !important;
            color: var(--zl-body-color) !important;
        }

        [data-theme="dark"] .input-group .btn-outline-secondary {
            color: var(--zl-heading-color) !important;
        }

        .input-group {
            border: 1px solid var(--zl-border-color);
            border-radius: var(--zl-border-radius);
            background: #fff;
        }

        [data-theme="dark"] .input-group {
            background: #111111;
        }

        .input-group .form-control {
            border: none !important;
        }
        [data-theme="dark"] .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5) !important;
        }
    </style>
</head>

<body>
    <div class="auth-controls">
        <button id="rtl-toggle" class="rtl-toggle-btn" aria-label="Toggle RTL">RTL</button>
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Dark Mode">
            <i class="bi bi-moon-fill"></i>
        </button>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card fade-in-up">
            <div class="auth-logo">
                <a href="index.html"
                    class="navbar-brand d-inline-flex align-items-center justify-content-center text-decoration-none mb-2">
                    <i class="bi bi-tree-fill me-2 text-secondary"></i><span class="text-primary">ZIPLINE</span>
                </a>
                <p class="text-muted">Create your account and start your adventure.</p>
            </div>

            <form action="dashboard.html">

                <div class="mb-3">
                    <label class="form-label fw-bold">Name</label>
                    <input type="text" class="form-control" placeholder="Name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Email Address</label>
                    <input type="email" class="form-control" placeholder="Email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Password</label>
                    <div class="input-group">
                        <input type="password" id="password" class="form-control" placeholder="Password" required>
                        <button class="btn btn-outline-secondary border-start-0" type="button"
                            onclick="togglePassword('password', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Confirm Password</label>
                    <div class="input-group">
                        <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password"
                            required>
                        <button class="btn btn-outline-secondary border-start-0" type="button"
                            onclick="togglePassword('confirmPassword', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="terms" required>
                        <label class="form-check-label text-muted small" for="terms">
                            I agree to the <a href="#" class="text-primary decoration-none">Terms of Service</a> and <a
                                href="#" class="text-primary decoration-none">Privacy Policy</a>
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 py-3 mb-4">Create Account</button>
            </form>

            <div class="divider">OR SIGN UP WITH</div>

            <div class="social-login">
                <button class="social-btn">
                    <i class="bi bi-google"></i>
                </button>
                <button class="social-btn">
                    <i class="bi bi-facebook"></i>
                </button>
                <button class="social-btn">
                    <i class="bi bi-apple"></i>
                </button>
            </div>

            <p class="text-center text-muted mb-0">
                Already have an account? <a href="login.html" class="text-primary fw-bold text-decoration-none">Log
                    In</a>
            </p>
        </div>
    </div>

    <script>
        function togglePassword(inputId, btn) {
            const passwordInput = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
